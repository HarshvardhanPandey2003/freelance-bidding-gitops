---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backend-secrets-k8s
  namespace: freelance-hub
spec:
  encryptedData:
    JWT_SECRET: 
    MONGODB_URI: 
    MONGODB_URL: 
    RAZORPAY_KEY_ID: 
    RAZORPAY_KEY_SECRET: 
  template:
    metadata:
      name: backend-secrets-k8s
      namespace: freelance-hub
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: frontend-secrets-k8s
  namespace: freelance-hub
spec:
  encryptedData:
    VITE_RAZORPAY_KEY: 
  template:
    metadata:
      name: frontend-secrets-k8s
      namespace: freelance-hub
    type: Opaque
